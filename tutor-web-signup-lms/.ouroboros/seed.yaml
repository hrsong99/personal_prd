existing_patterns:
  - Hono RPC API가 tutor-web의 /api/v1에 마운트되어 있고 컨트롤러는 src/server/modules/*/controller/* 디렉터리에 위치 (auth·boards 패턴 참조)
  - drizzle-orm 스키마가 src/server/db/schema/*에서 GT_* 레거시 테이블을 미러링하며 신규 4개 테이블도 동일 패턴으로 추가
  - AuthService.loginByEmail이 GT_USER ⋈ GT_TUTOR를 EMAIL로 조인하고 SHA1(password)를 비교, 토큰을 Redis에 저장 + 쿠키 발급 (signUp도 같은 토큰 발급 헬퍼 재사용)
  - withAuthentication 미들웨어가 /[locale]/(before-login)/* 경로만 공개로 처리; /signup도 화이트리스트 추가 필요
  - next-intl URL prefix locale routing — locales=['ko','ja','en'], LOCALE_PREFIXES={ko:'/kr', ja:'/jp', en:'/en'}, defaultLocale='ko', localePrefix.mode='always' + createNextIntlPlugin 통합 (src/shared/config/i18n/{locales,routing-config,request}.ts)
  - widgets/navigation/side-navigation/side-navigation.tsx와 하단 네비게이션 위젯이 탭 항목 배열을 선언적으로 정의 (교육 탭 추가)
  - grape admin/cms/content_create.php·content_edit.php·content_list.php의 CRUD 페이지 패턴 (admin/tutor_training/* 신규 화면이 동일 구조 사용)
  - grape inc/upload_presigned_for_s3.php가 파일을 업로드하고 public-read S3 URL을 반환 (영상·아이콘 업로드에 재사용)
  - grape TB_SYS_CODE_DETAIL(TB_SYS_CODE 자식)을 group + code + value로 조회하는 공통코드 패턴 (admin/system/code/ 화면이 편집 UI)
  - grape GT_ADMIN_MENU에 신규 페이지 INSERT로 메뉴 등록 (admin/sql/*_menu.sql 패턴)
  - grape admin/podo_teachers_v1.php의 튜터 목록 페이지에 필터·컬럼·버튼을 확장하는 패턴 (penalty-skip-admin PRD와 유사)
  - tutor-web vitest 단위 테스트 설정 재사용 (별도 통합 테스트 인프라 도입 없음)

existing_dependencies:
  - Next.js 15 (app router)
  - Hono (RPC at /api/v1)
  - drizzle-orm (gwatop MySQL 직접 접근)
  - next-intl (locales ko/ja/en, URL prefix)
  - Redis (JWT 세션 저장)
  - MySQL — 데이터베이스 'gwatop' (grape·tutor-web 공유)
  - AWS S3 (영상·아이콘 공개 버킷, presigned URL 미사용)
  - PHP (grape 어드민 런타임)
  - vitest (tutor-web 단위 테스트)

